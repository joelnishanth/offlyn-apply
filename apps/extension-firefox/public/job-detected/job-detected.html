<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offlyn – Job detected</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;1,400;1,500&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <script src="../shared/theme-init.js"></script>
  <style>
    /* ── Design Tokens ── */
    :root {
      --black: #0a0a0a;
      --white: #ffffff;
      --off-white: #f9f8f6;
      --green: #1a7f5a;
      --green-light: #e6f4ee;
      --green-mid: #2da870;
      --gray-100: #f4f3f0;
      --gray-200: #e8e6e1;
      --gray-400: #9e9b93;
      --gray-600: #5a5750;
      --gray-800: #2c2b28;
      --border: #e2e0da;
      --radius-sm: 6px;
      --radius-md: 10px;
      --radius-lg: 16px;
      --font-serif: 'Lora', Georgia, serif;
      --font-sans: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }
    
    html.dark {
      --black: #ffffff;
      --white: #0a0a0a;
      --off-white: #111111;
      --green: #2da870;
      --green-light: #1a3a2a;
      --green-mid: #34d399;
      --gray-100: #1a1a1a;
      --gray-200: #2a2a2a;
      --gray-400: #737373;
      --gray-600: #a3a3a3;
      --gray-800: #e5e5e5;
      --border: #2a2a2a;
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: var(--font-sans);
      font-size: 15px;
      color: var(--black);
      background: var(--off-white);
      min-height: 100vh;
      padding: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      -webkit-font-smoothing: antialiased;
    }
    .card {
      max-width: 400px;
      width: 100%;
      background: var(--white);
      border-radius: var(--radius-md);
      box-shadow: 0 4px 16px rgba(0,0,0,0.08);
      padding: 24px;
    }
    .card h1 { font-family: var(--font-serif); font-size: 18px; margin-bottom: 8px; color: var(--green); font-weight: 500; }
    .card .company { color: var(--gray-600); font-size: 14px; margin-bottom: 20px; }
    .card .hostname { font-size: 12px; color: var(--gray-400); margin-bottom: 20px; }
    .btn {
      display: inline-block;
      padding: 10px 20px;
      background: var(--green);
      color: #fff;
      border: none;
      border-radius: var(--radius-sm);
      font-size: 14px;
      cursor: pointer;
      text-decoration: none;
      font-family: var(--font-sans);
    }
    .btn:hover { background: var(--green-mid); }
    .btn.secondary { background: var(--gray-600); }
    .btn.secondary:hover { background: var(--gray-800); }
    .actions { display: flex; gap: 12px; flex-wrap: wrap; }
  </style>
</head>
<body>
  <div class="card">
    <h1 id="job-title">Job detected</h1>
    <p class="company" id="job-company"></p>
    <p class="hostname" id="job-hostname"></p>
    <div class="actions">
      <button type="button" class="btn" id="btn-focus">Focus application tab</button>
      <a href="#" id="link-onboarding" class="btn secondary">Set up profile</a>
    </div>
  </div>
  <script src="job-detected.js"></script>
  <script src="../shared/dark-mode.js"></script>
</body>
</html>
