<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offlyn Apply</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;1,400;1,500&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <script src="../shared/theme-init.js"></script>
  <style>
    :root {
      --black: #0a0a0a;
      --white: #ffffff;
      --off-white: #f9f8f6;
      --green: #16a34a;
      --green-light: #e6f4ee;
      --green-mid: #2da870;
      --gray-50: #fafaf9;
      --gray-100: #f4f3f0;
      --gray-200: #e8e6e1;
      --gray-400: #9e9b93;
      --gray-600: #5a5750;
      --gray-800: #2c2b28;
      --border: #e2e0da;
      --radius: 8px;
      --font-serif: 'Lora', Georgia, serif;
      --font-sans: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }
    html.dark {
      --black: #ffffff;
      --white: #111111;
      --off-white: #1a1a1a;
      --green: #2da870;
      --green-light: #1a3a2a;
      --green-mid: #34d399;
      --gray-50: #161616;
      --gray-100: #1e1e1e;
      --gray-200: #2a2a2a;
      --gray-400: #737373;
      --gray-600: #a3a3a3;
      --gray-800: #e5e5e5;
      --border: #2a2a2a;
    }
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 340px;
      font-family: var(--font-sans);
      font-size: 13px;
      color: var(--black);
      background: var(--white);
      -webkit-font-smoothing: antialiased;
    }

    /* ── Header ── */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      background: var(--white);
    }
    .header-logo { height: 28px; width: auto; }
    .header-actions { display: flex; align-items: center; gap: 8px; }
    .dark-mode-toggle {
      width: 26px; height: 26px; border-radius: 50%;
      background: var(--gray-100); border: 1px solid var(--border);
      cursor: pointer; color: var(--gray-600);
      display: flex; align-items: center; justify-content: center;
      transition: background .15s;
    }
    .dark-mode-toggle:hover { background: var(--gray-200); }
    .header-toggle {
      position: relative; width: 36px; height: 20px;
      background: var(--gray-200); border-radius: 10px;
      cursor: pointer; transition: background .2s;
    }
    .header-toggle.active { background: var(--green); }
    .header-toggle::after {
      content: ''; position: absolute;
      width: 16px; height: 16px; border-radius: 50%;
      background: var(--white); top: 2px; left: 2px;
      transition: transform .2s;
      box-shadow: 0 1px 2px rgba(0,0,0,.15);
    }
    .header-toggle.active::after { transform: translateX(16px); }

    /* ── Tab bar ── */
    .tab-bar {
      display: flex;
      border-bottom: 1px solid var(--border);
      background: var(--white);
    }
    .tab-btn {
      flex: 1;
      padding: 10px 0;
      background: none; border: none;
      font-family: var(--font-sans);
      font-size: 12px; font-weight: 500;
      color: var(--gray-400);
      cursor: pointer;
      position: relative;
      transition: color .15s;
      display: flex; align-items: center; justify-content: center; gap: 5px;
    }
    .tab-btn:hover { color: var(--gray-600); }
    .tab-btn.active { color: var(--green); font-weight: 600; }
    .tab-btn.active::after {
      content: ''; position: absolute;
      bottom: -1px; left: 16px; right: 16px;
      height: 2px; background: var(--green); border-radius: 2px;
    }
    .tab-btn svg { width: 14px; height: 14px; }

    /* ── Tab panels ── */
    .tab-panel { display: none; padding: 14px 16px; }
    .tab-panel.active { display: block; }

    /* ── Autofill tab ── */
    .job-card {
      padding: 10px 12px;
      background: #1e293b;
      border-radius: var(--radius);
      margin-bottom: 12px;
      color: #fff;
    }
    html.dark .job-card { background: #0f172a; }
    .job-card-detected { display: flex; align-items: flex-start; gap: 8px; }
    .job-dot {
      width: 7px; height: 7px; background: #4ade80;
      border-radius: 50%; margin-top: 4px; flex-shrink: 0;
      position: relative;
    }
    .job-dot::before {
      content: ''; position: absolute; top: 50%; left: 50%;
      width: 100%; height: 100%; border-radius: 50%;
      background: #4ade80; opacity: .7;
      animation: ping 1.4s ease-out infinite;
    }
    @keyframes ping {
      0% { transform: translate(-50%,-50%) scale(1); opacity: .7; }
      75%,100% { transform: translate(-50%,-50%) scale(2.8); opacity: 0; }
    }
    .job-title { font-size: 12px; font-weight: 600; line-height: 1.3; }
    .job-detail { font-size: 11px; color: rgba(255,255,255,.55); margin-top: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .job-empty { font-size: 11px; color: rgba(255,255,255,.35); font-style: italic; }

    .btn-autofill {
      display: flex; align-items: center; justify-content: center; gap: 8px;
      width: 100%; padding: 12px;
      background: var(--green); color: #fff;
      border: none; border-radius: var(--radius);
      font-size: 13px; font-weight: 600; font-family: inherit;
      cursor: pointer; transition: all .15s;
    }
    .btn-autofill:hover { background: #15803d; box-shadow: 0 4px 12px rgba(22,163,74,.3); transform: translateY(-1px); }
    .btn-autofill:active { transform: translateY(0); }
    .btn-autofill:disabled { opacity: .45; cursor: not-allowed; transform: none; box-shadow: none; }
    .btn-autofill svg { flex-shrink: 0; }

    .dryrun-row {
      display: flex; align-items: center; justify-content: space-between;
      margin-top: 10px; font-size: 11px; color: var(--gray-600);
    }
    .mini-toggle {
      position: relative; width: 30px; height: 16px;
      background: var(--gray-200); border-radius: 8px;
      cursor: pointer; transition: background .2s;
    }
    .mini-toggle.active { background: var(--green); }
    .mini-toggle::after {
      content: ''; position: absolute;
      width: 12px; height: 12px; border-radius: 50%;
      background: var(--white); top: 2px; left: 2px;
      transition: transform .2s;
      box-shadow: 0 1px 2px rgba(0,0,0,.12);
    }
    .mini-toggle.active::after { transform: translateX(14px); }

    .stats-row {
      display: flex; gap: 8px; margin-top: 12px;
    }
    .stat-card {
      flex: 1; padding: 10px;
      background: var(--gray-50); border: 1px solid var(--border);
      border-radius: var(--radius); text-align: center;
    }
    .stat-label { font-size: 10px; color: var(--gray-400); font-weight: 500; margin-bottom: 3px; }
    .stat-num { font-size: 22px; font-weight: 700; color: var(--black); line-height: 1; }
    .stat-num.green { color: var(--green); }

    /* Badge notification */
    .badge-notification {
      display: none; align-items: center; gap: 8px;
      padding: 8px 10px; margin-top: 10px;
      background: #fef3c7; border: 1px solid #fde68a;
      border-radius: var(--radius); font-size: 11px; color: #92400e;
    }
    html.dark .badge-notification { background: #422006; border-color: #92400e; color: #fbbf24; }
    .badge-notification .badge-text { flex: 1; line-height: 1.35; }
    .badge-notification .badge-text strong { font-weight: 600; }
    .badge-notification .badge-action {
      background: #f59e0b; color: #fff; border: none;
      padding: 4px 10px; border-radius: 5px;
      font-size: 10px; font-weight: 600; cursor: pointer;
      white-space: nowrap;
    }
    .badge-notification .badge-dismiss {
      background: none; border: none; color: #92400e;
      cursor: pointer; font-size: 14px; line-height: 1; padding: 0;
    }
    html.dark .badge-notification .badge-dismiss { color: #fbbf24; }

    /* New jobs banner */
    .new-jobs-banner {
      display: none; align-items: center; gap: 8px;
      padding: 8px 10px; margin-top: 10px;
      background: linear-gradient(90deg, #7c3aed, #6d28d9);
      border-radius: var(--radius); font-size: 11px; color: #fff; cursor: pointer;
    }
    .new-jobs-banner:hover { opacity: .92; }
    .new-jobs-text { flex: 1; font-weight: 500; line-height: 1.3; }
    .new-jobs-text small { display: block; font-weight: 400; font-size: 10px; opacity: .8; }
    .new-jobs-dismiss { background: none; border: none; color: rgba(255,255,255,.6); cursor: pointer; font-size: 14px; }

    /* Profile warning */
    #profile-warning {
      display: none; padding: 8px 10px; margin-top: 10px;
      background: #fff7ed; border: 1px solid #fed7aa;
      border-radius: var(--radius); font-size: 11px; color: #92400e; line-height: 1.4;
    }
    html.dark #profile-warning { background: #1c1108; border-color: #92400e; color: #fbbf24; }
    #profile-warning a { color: inherit; text-decoration: underline; }

    /* ── Tools tab ── */
    .tool-list { display: flex; flex-direction: column; gap: 2px; }
    .tool-row {
      display: flex; align-items: center; gap: 10px;
      padding: 11px 8px;
      background: none; border: none;
      font-family: inherit; font-size: 13px; font-weight: 500;
      color: var(--black); cursor: pointer;
      border-radius: 6px; transition: background .12s;
      width: 100%; text-align: left;
    }
    .tool-row:hover { background: var(--gray-100); }
    .tool-icon {
      width: 32px; height: 32px;
      display: flex; align-items: center; justify-content: center;
      background: var(--gray-50); border: 1px solid var(--border);
      border-radius: 8px; color: var(--gray-600); flex-shrink: 0;
    }
    .tool-label { flex: 1; }
    .tool-chevron { color: var(--gray-400); font-size: 11px; flex-shrink: 0; }

    /* ── Profile tab ── */
    .profile-card {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 12px;
      background: var(--gray-50); border: 1px solid var(--border);
      border-radius: var(--radius);
      cursor: pointer; transition: background .12s;
      position: relative;
    }
    .profile-card:hover { background: var(--gray-100); }
    .profile-dot {
      width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0;
    }
    .profile-name { font-weight: 600; font-size: 13px; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .profile-role { font-size: 11px; color: var(--gray-400); max-width: 80px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .profile-arrow { color: var(--gray-400); font-size: 10px; flex-shrink: 0; }
    .profile-dropdown {
      display: none; position: absolute;
      left: 0; right: 0; top: 100%; margin-top: 4px;
      background: var(--white); border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: 0 8px 24px rgba(0,0,0,.12);
      z-index: 100; max-height: 200px; overflow-y: auto;
    }
    .profile-dropdown.open { display: block; }
    .profile-dropdown-item {
      display: flex; align-items: center; gap: 8px;
      padding: 9px 12px; cursor: pointer; font-size: 12px;
      transition: background .1s;
    }
    .profile-dropdown-item:hover { background: var(--gray-100); }
    .profile-dropdown-item.active { background: var(--green-light); }
    .profile-dropdown-item .pdi-name { font-weight: 600; }
    .profile-dropdown-item .pdi-role { color: var(--gray-400); font-size: 11px; margin-left: auto; }
    .profile-dropdown-manage {
      display: flex; align-items: center; justify-content: center; gap: 4px;
      padding: 8px 12px; border-top: 1px solid var(--border);
      cursor: pointer; font-size: 11px; font-weight: 600; color: var(--green);
      transition: background .1s;
    }
    .profile-dropdown-manage:hover { background: var(--green-light); }

    .profile-links { margin-top: 10px; display: flex; flex-direction: column; gap: 2px; }

    .divider { height: 1px; background: var(--border); margin: 8px 0; }

    .advanced-toggle {
      display: flex; align-items: center; justify-content: space-between;
      width: 100%; padding: 8px 4px;
      background: none; border: none;
      font-family: inherit; font-size: 12px; font-weight: 500;
      color: var(--gray-400); cursor: pointer; transition: color .15s;
    }
    .advanced-toggle:hover { color: var(--black); }
    .advanced-toggle .arrow { display: inline-block; transition: transform .2s; font-size: 10px; }
    .advanced-toggle.open .arrow { transform: rotate(180deg); }
    .advanced-panel { display: none; flex-direction: column; gap: 4px; padding-bottom: 4px; }
    .advanced-panel.open { display: flex; }
    .btn-adv {
      padding: 7px 10px;
      border: 1px solid var(--border); border-radius: 6px;
      background: var(--white); color: var(--gray-600);
      font-size: 11px; font-weight: 500; cursor: pointer;
      font-family: inherit; text-align: center;
      transition: all .12s;
    }
    .btn-adv:hover { background: var(--gray-100); border-color: var(--gray-400); }

    .footer-links {
      display: flex; justify-content: center; gap: 12px;
      margin-top: 8px; font-size: 11px;
    }
    .footer-link-btn {
      background: none; border: none;
      color: var(--gray-400); font-size: 11px; font-family: inherit;
      cursor: pointer; padding: 2px 0; transition: color .12s;
    }
    .footer-link-btn:hover { color: var(--black); }

    /* ── Ollama footer ── */
    .ollama-footer {
      display: flex; align-items: center; gap: 6px;
      padding: 7px 16px;
      font-size: 11px; color: var(--gray-400);
      background: var(--gray-50);
      border-top: 1px solid var(--border);
    }
    .ollama-footer svg { flex-shrink: 0; }
    .ollama-status { margin-left: auto; font-weight: 600; font-size: 11px; }
    .ollama-status.connected { color: var(--green); }
    .ollama-status.disconnected { color: #dc2626; }
    .ollama-footer.clickable { cursor: pointer; }
    .ollama-footer.clickable:hover { background: var(--gray-100); }

    /* ── Utility ── */
    .hidden { display: none !important; }
  </style>
</head>
<body>

  <!-- Header -->
  <div class="header">
    <img class="header-logo" src="../icons/primary-logo.png" alt="Offlyn Apply">
    <div class="header-actions">
      <button id="dark-mode-toggle" class="dark-mode-toggle" aria-label="Toggle dark mode"></button>
      <div class="header-toggle active" id="toggle-enabled" title="Enable / Disable" role="switch" aria-checked="true" tabindex="0"></div>
    </div>
  </div>

  <!-- Tab bar -->
  <div class="tab-bar">
    <button class="tab-btn active" data-tab="tab-autofill">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3l1.5 4.5L18 9l-4.5 1.5L12 15l-1.5-4.5L6 9l4.5-1.5L12 3z"/></svg>
      Autofill
    </button>
    <button class="tab-btn" data-tab="tab-tools">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/></svg>
      Tools
    </button>
    <button class="tab-btn" data-tab="tab-profile">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      Profile
    </button>
  </div>

  <!-- ═══ Tab 1: Autofill ═══ -->
  <div class="tab-panel active" id="tab-autofill">
    <div class="job-card" id="job-info">
      <div class="job-empty">No job detected yet</div>
    </div>

    <button class="btn-autofill" id="manual-autofill-btn">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3l1.5 4.5L18 9l-4.5 1.5L12 15l-1.5-4.5L6 9l4.5-1.5L12 3z"/></svg>
      Auto-Fill Application
    </button>

    <div class="dryrun-row">
      <span>Dry Run (preview only)</span>
      <div class="mini-toggle" id="dryrun-toggle" role="switch" aria-checked="false" tabindex="0"></div>
    </div>

    <div class="stats-row">
      <div class="stat-card">
        <div class="stat-label">Applications</div>
        <div class="stat-num" id="stat-total">0</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Interviewing</div>
        <div class="stat-num green" id="stat-interviewing">0</div>
      </div>
    </div>

    <!-- Badge notification (permission grant) -->
    <div class="badge-notification" id="badge-notification">
      <div class="badge-text" id="badge-notification-text">
        <strong>Job page detected</strong> — Grant access to autofill this site
      </div>
      <button class="badge-action" id="badge-grant-btn">Grant</button>
      <button class="badge-dismiss" id="badge-dismiss-btn">&times;</button>
    </div>

    <!-- New jobs banner -->
    <div class="new-jobs-banner" id="new-jobs-banner">
      <div class="new-jobs-text" id="new-jobs-text">
        <span id="new-jobs-count">3 new jobs</span> match your profile
        <small>Tap to view</small>
      </div>
      <button class="new-jobs-dismiss" id="new-jobs-dismiss">&times;</button>
    </div>

    <!-- Profile warning -->
    <div id="profile-warning"></div>
  </div>

  <!-- ═══ Tab 2: Tools ═══ -->
  <div class="tab-panel" id="tab-tools">
    <div class="tool-list">
      <button class="tool-row" id="cover-letter-btn">
        <div class="tool-icon">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
        </div>
        <span class="tool-label">Generate Cover Letter</span>
        <span class="tool-chevron">&#8250;</span>
      </button>
      <button class="tool-row" id="tailor-resume-btn">
        <div class="tool-icon">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3l1.5 4.5L18 9l-4.5 1.5L12 15l-1.5-4.5L6 9l4.5-1.5L12 3z"/><path d="M19 13l1 3 3 1-3 1-1 3-1-3-3-1 3-1 1-3z"/></svg>
        </div>
        <span class="tool-label">Tailor Resume</span>
        <span class="tool-chevron">&#8250;</span>
      </button>
      <button class="tool-row" id="btn-jobs">
        <div class="tool-icon">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        </div>
        <span class="tool-label">Find Jobs</span>
        <span class="tool-chevron">&#8250;</span>
      </button>
      <button class="tool-row" id="chat-resume-btn">
        <div class="tool-icon">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
        </div>
        <span class="tool-label">Chat with Resume</span>
        <span class="tool-chevron">&#8250;</span>
      </button>
      <button class="tool-row" id="data-explorer-btn">
        <div class="tool-icon">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
        </div>
        <span class="tool-label">Data Explorer</span>
        <span class="tool-chevron">&#8250;</span>
      </button>
    </div>
  </div>

  <!-- ═══ Tab 3: Profile ═══ -->
  <div class="tab-panel" id="tab-profile">
    <div class="profile-card" id="profile-switcher">
      <div class="profile-dot" id="profile-dot"></div>
      <span class="profile-name" id="profile-name-display">Default</span>
      <span class="profile-role" id="profile-role-display"></span>
      <span class="profile-arrow">&#9662;</span>
      <div class="profile-dropdown" id="profile-dropdown"></div>
    </div>

    <div class="profile-links">
      <button class="tool-row" id="profile-btn">
        <div class="tool-icon">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        </div>
        <span class="tool-label">Manage Profile</span>
        <span class="tool-chevron">&#8250;</span>
      </button>
      <button class="tool-row" id="view-dashboard-btn">
        <div class="tool-icon">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
        </div>
        <span class="tool-label">View Dashboard</span>
        <span class="tool-chevron">&#8250;</span>
      </button>
    </div>

    <div class="divider"></div>

    <button class="advanced-toggle" id="advanced-toggle" aria-expanded="false">
